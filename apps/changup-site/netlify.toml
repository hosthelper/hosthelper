# 창업정보 모임 전용 Netlify 사이트 설정 (apps/web = 호스트헬퍼와 분리)
# 새 사이트 생성 시 Netlify UI에서 Base directory = apps/changup-site 로 지정하면
# 이 파일이 그대로 적용됩니다.
# 라이브 SPA는 app.html이 원본 — 빌드 시 index.html로 복사해 루트(/)에서 서빙합니다.
[build]
  publish = "."
  command = "cp app.html index.html"

[build.environment]
  # 혹시 모를 Next.js 자동 감지 비활성화
  NETLIFY_NEXT_PLUGIN_SKIP = "true"
