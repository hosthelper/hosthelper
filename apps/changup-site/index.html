<body>
<style>
:root, :root[data-theme="dark"], :root[data-theme="light"]{
  /* 차분한 에디토리얼 — 웜페이퍼 + 절제된 테라코타 코랄 (신뢰감 있는 창업 정보 톤) */
  --bg:#faf6f1;--card:#ffffff;--ink:#241e1a;--sub:#6d635b;--brand:#cf4a2e;--brand-d:#b13c22;--brand-l:#e0765b;
  --tint:#f5ebe4;--line:#ece1d8;--mute:#a1958c;--gold:#cf4a2e;--on-brand:#ffffff;
  --r:12px;--r-sm:9px;--r-lg:16px;
  --grad:linear-gradient(180deg,#d5502f,#c4401f);
  --shadow-sm:0 1px 2px rgba(40,25,20,.04);
  --shadow:0 1px 3px rgba(40,25,20,.05);
  --shadow-lg:0 6px 22px rgba(40,25,20,.08);
  --ring:0 0 0 3px rgba(207,74,46,.16);
  color-scheme:light;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
#app>*{animation:fadeUp .5s cubic-bezier(.16,1,.3,1) both}
#app>*:nth-child(2){animation-delay:.06s}
#app>*:nth-child(3){animation-delay:.12s}
#app>*:nth-child(4){animation-delay:.18s}
#app>*:nth-child(5){animation-delay:.24s}
#app>*:nth-child(n+6){animation-delay:.3s}
@media (prefers-reduced-motion:reduce){#app>*{animation:none}}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--bg);color:var(--ink);font-family:'Pretendard Variable','Pretendard','Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;line-height:1.6;word-break:keep-all;letter-spacing:-.01em}
a{color:inherit}
::selection{background:color-mix(in srgb,var(--brand) 26%,transparent)}
.wrap{max-width:600px;margin:0 auto;padding:0 1.25rem}

/* 상단바 */
.bar{position:sticky;top:0;z-index:30;background:color-mix(in srgb,var(--bg) 78%,transparent);backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);border-bottom:1px solid color-mix(in srgb,var(--line) 70%,transparent)}
.bar .row{max-width:600px;margin:0 auto;padding:.72rem 1.25rem;display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:.55rem;text-decoration:none;color:var(--ink);font-weight:800;font-size:1.04rem;letter-spacing:-.03em;cursor:pointer}
.logo{width:31px;height:31px;border-radius:8px;background:var(--grad);display:flex;align-items:center;justify-content:center;color:var(--on-brand);font-weight:800;font-size:.92rem}
.nav{display:flex;align-items:center;gap:.15rem}
.nav a{font-size:.86rem;font-weight:700;color:var(--sub);text-decoration:none;padding:.42rem .62rem;border-radius:9px;cursor:pointer;transition:color .15s,background .15s}
.nav a:not(.cta):hover{color:var(--ink);background:color-mix(in srgb,var(--tint) 60%,transparent)}
.nav a.on{color:var(--brand)}
.nav a.cta{color:var(--brand-d);background:transparent;border:1.5px solid var(--brand);padding:.4rem .85rem;border-radius:8px;margin-left:.3rem;transition:background .12s}
.nav a.cta:hover{background:var(--tint)}

/* 공통 */
h1{letter-spacing:-.045em;text-wrap:balance}
.hero h1,h2,.ctitle,.article h1,.article h3,.legal h1,.done h3,.promo h2,.advisor .nm{font-family:'Noto Serif KR','Nanum Myeongjo',serif;font-weight:700;letter-spacing:-.02em}
.hero h1,.article h1{font-weight:900}
.g{color:var(--brand);font-style:italic}
.btn{display:inline-block;text-align:center;padding:.68rem 1.5rem;border-radius:8px;border:1.5px solid var(--brand);background:transparent;color:var(--brand-d);font-weight:700;font-size:.9rem;text-decoration:none;cursor:pointer;font-family:inherit;transition:background .14s ease,border-color .14s ease}
.btn:hover{background:var(--tint)}
.pill{display:inline-flex;align-items:center;gap:.5rem;background:transparent;color:var(--brand-d);font-weight:700;font-size:.76rem;letter-spacing:.02em;padding:0}
.dot{width:6px;height:6px;border-radius:50%;background:var(--brand)}
section{padding:2.3rem 0}
h2{font-size:1.5rem;font-weight:800;letter-spacing:-.03em;margin:0 0 1.1rem;text-wrap:balance}

/* 히어로 — 에디토리얼 좌측 정렬 */
.hero{position:relative;padding:3rem 0 1.4rem;text-align:left;border-bottom:1px solid var(--line);margin-bottom:.4rem}
.hero .pill{margin-bottom:1.3rem}
.hero h1{font-size:clamp(2.3rem,9vw,3rem);line-height:1.18;font-weight:900;margin:0 0 1.2rem;letter-spacing:-.04em}
.lead{color:var(--sub);font-size:1.05rem;line-height:1.75;margin:0;max-width:30em}
.trust{display:flex;justify-content:flex-start;gap:1.2rem;flex-wrap:wrap;margin-top:1.6rem}
.trust span{display:inline-flex;align-items:center;gap:.4rem;color:var(--sub);font-size:.82rem}
.trust b{color:var(--ink);font-weight:700}
.trust span::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--brand)}

/* 지표 */
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:0;margin:2rem 0 .4rem;border:1px solid var(--line);border-radius:var(--r);overflow:hidden;background:var(--card)}
.metric{position:relative;padding:1.5rem .5rem 1.4rem;text-align:center}
.metric+.metric{border-left:1px solid var(--line)}
.metric .fig{font-size:1.9rem;font-weight:800;color:var(--brand);font-variant-numeric:tabular-nums;line-height:1;font-family:'Noto Serif KR',serif}
.metric .cap{font-size:.72rem;color:var(--sub);margin-top:.45rem;line-height:1.4;font-weight:600}
/* 신뢰 배지 (정직한 사회적 증거) */
.badges{display:flex;flex-wrap:wrap;gap:.4rem 1.1rem;justify-content:center;margin:1.3rem 0 .2rem}
.badges span{display:inline-flex;align-items:center;gap:.35rem;font-size:.76rem;font-weight:600;color:var(--sub)}
.badges span::before{content:"✓";color:var(--brand);font-weight:800}
/* 무료 권리금 진단 (lead magnet) */
.gwiz{background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);padding:1.4rem 1.25rem;box-shadow:var(--shadow);margin-top:1.05rem}
.gwiz label{display:block;font-size:.84rem;font-weight:700;color:var(--ink);margin:1rem 0 .4rem}
.gwiz label:first-child{margin-top:0}
.gwiz select,.gwiz input{width:100%;padding:.8rem .95rem;border:1px solid var(--line);border-radius:var(--r-sm);font-size:.95rem;background:var(--bg);color:var(--ink);font-family:inherit;transition:border-color .14s,box-shadow .14s}
.gwiz input::placeholder{color:var(--mute)}
.gwiz input:focus,.gwiz select:focus{outline:none;border-color:var(--brand);box-shadow:var(--ring)}
.gwiz .btn{margin-top:1.2rem}
.gwout{margin-top:1.15rem;padding:1.3rem 1.1rem;border-radius:var(--r);background:var(--tint);border:1px solid color-mix(in srgb,var(--brand) 18%,transparent);text-align:center}
.gwout .gwrange{font-size:1.7rem;font-weight:800;color:var(--brand);font-family:'Noto Serif KR',serif;font-variant-numeric:tabular-nums;letter-spacing:-.01em;line-height:1.25}
.gwout .gwnote{font-size:.85rem;color:var(--brand-d);font-weight:700;margin-top:.35rem}
.gwout .gwdisc{font-size:.76rem;color:var(--sub);line-height:1.55;margin:.75rem 0 1rem}
.gwout .btn{margin-top:0}
/* 진행 4단계 (마찰 제거) */
.steps{display:grid;grid-template-columns:repeat(2,1fr);gap:.7rem}
.step{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:1.1rem 1rem;box-shadow:var(--shadow-sm)}
.step .sn{width:30px;height:30px;border-radius:50%;background:var(--grad);color:var(--on-brand);font-weight:800;display:flex;align-items:center;justify-content:center;font-size:.95rem;margin-bottom:.6rem}
.step b{display:block;color:var(--ink);font-size:.98rem;margin-bottom:.15rem}
.step span{font-size:.8rem;color:var(--sub);line-height:1.45}

/* 섹션 헤더 */
.sh{display:flex;align-items:baseline;justify-content:space-between;gap:1rem;margin-bottom:1rem}
.sh h2{margin:0}
.more-lnk{font-size:.85rem;font-weight:700;color:var(--brand);text-decoration:none;white-space:nowrap;cursor:pointer;transition:opacity .15s}
.more-lnk:hover{opacity:.7}

/* 카드/피드 */
.feed{display:grid;gap:.85rem}
.card{position:relative;display:block;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:1.35rem;text-decoration:none;color:var(--ink);box-shadow:var(--shadow);cursor:pointer;transition:transform .16s ease,box-shadow .16s ease,border-color .16s ease}
.card::before{content:"";position:absolute;left:0;top:1.2rem;bottom:1.2rem;width:3px;border-radius:3px;background:var(--grad);opacity:0;transition:opacity .16s ease}
.card:hover{transform:translateY(-1px);box-shadow:var(--shadow-lg);border-color:color-mix(in srgb,var(--brand) 30%,var(--line))}
.card:hover::before{opacity:1}
.card:hover .cmore{gap:.5rem}
.ctop{display:flex;align-items:center;gap:.55rem;margin-bottom:.55rem}
.tag{background:var(--tint);color:var(--brand-d);font-size:.71rem;font-weight:700;padding:.24rem .62rem;border-radius:999px;letter-spacing:-.01em}
.date{color:var(--mute);font-size:.75rem;font-variant-numeric:tabular-nums}
.new{background:var(--brand);color:var(--on-brand);font-size:.64rem;font-weight:800;padding:.18rem .5rem;border-radius:4px;letter-spacing:.08em}
.ctitle{font-weight:800;font-size:1.16rem;line-height:1.42;margin:.1rem 0 .4rem;letter-spacing:-.02em}
.cex{color:var(--sub);font-size:.9rem;line-height:1.62;margin:0}
.cmore{display:inline-flex;align-items:center;gap:.3rem;margin-top:.8rem;font-size:.83rem;font-weight:800;color:var(--brand);transition:gap .16s ease}

/* 필터 */
.filters{display:flex;gap:.45rem;flex-wrap:wrap;margin:0 0 1.2rem}
.fchip{padding:.44rem .95rem;border-radius:999px;border:1px solid var(--line);background:var(--card);color:var(--sub);font-size:.85rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .14s ease;box-shadow:var(--shadow-sm)}
.fchip:hover{border-color:color-mix(in srgb,var(--brand) 40%,var(--line));color:var(--ink)}
.fchip.on{background:var(--brand);border-color:transparent;color:var(--on-brand)}

/* 기사 상세 */
.article .tag{display:inline-block;margin:1.2rem 0 .5rem}
.article .amd{color:var(--mute);font-size:.78rem;margin:0 0 .5rem}
.article h1{font-size:1.72rem;line-height:1.32;font-weight:800;margin:.2rem 0 1.1rem;letter-spacing:-.03em}
.article .alead{font-size:1.07rem;line-height:1.76;font-weight:600;color:var(--ink);margin:0 0 1.5rem;padding-bottom:1.4rem;border-bottom:1px solid var(--line)}
.article h3{font-size:1.18rem;font-weight:800;margin:2rem 0 .6rem;letter-spacing:-.02em;padding-left:.8rem;border-left:3px solid var(--brand);border-radius:1px}
.article p{color:var(--sub);font-size:1rem;line-height:1.86;margin:0 0 1.05rem}
.article p b{color:var(--ink);font-weight:700}
.summary{margin:2rem 0 0;background:var(--tint);border-radius:var(--r);padding:1.35rem 1.45rem;border:1px solid color-mix(in srgb,var(--brand) 14%,transparent)}
.summary b{display:flex;align-items:center;gap:.4rem;color:var(--brand-d);font-weight:800;font-size:.94rem;margin-bottom:.6rem}
.summary b::before{content:"✓";display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;background:var(--grad);color:var(--on-brand);border-radius:6px;font-size:.7rem}
.summary ul{margin:0;padding-left:1.1rem}.summary li{color:var(--ink);font-size:.93rem;line-height:1.72;margin-bottom:.42rem}
.src{color:var(--mute);font-size:.78rem;line-height:1.75;margin:1.7rem 0 0;padding-top:1.1rem;border-top:1px solid var(--line)}
.src>b{display:block;color:var(--ink);font-weight:800;font-size:.82rem;margin-bottom:.5rem}
.srclist{list-style:none;margin:0 0 .7rem;padding:0;display:grid;gap:.35rem}
.srclist a{display:inline-flex;align-items:center;gap:.35rem;color:var(--brand);font-weight:700;font-size:.82rem;text-decoration:none;border-bottom:1px solid transparent}
.srclist a:hover{border-bottom-color:var(--brand)}
.srcnote{margin:.4rem 0 0}
.backlnk{display:inline-block;margin-top:1.2rem;font-size:.85rem;font-weight:700;color:var(--brand);text-decoration:none;cursor:pointer}

/* 왜무료 / 컨설턴트 / faq */
.why{display:grid;gap:.65rem}
.wrow{display:flex;gap:.8rem;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:1.1rem 1.2rem;box-shadow:var(--shadow);transition:transform .14s,box-shadow .14s}
.wrow:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.wrow svg{flex:0 0 24px;width:24px;height:24px;padding:1px;color:var(--brand);background:transparent}
.wrow b{font-weight:800}.wrow span{color:var(--sub);display:block;font-size:.89rem;margin-top:.14rem;line-height:1.55}
.advisor{display:flex;gap:1rem;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:1.35rem;box-shadow:var(--shadow);position:relative;overflow:hidden}
.advisor::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--grad)}
.av{flex:0 0 54px;width:54px;height:54px;border-radius:999px;background:var(--tint);color:var(--brand-d);display:flex;align-items:center;justify-content:center;font-size:1.35rem;font-weight:800;font-family:'Noto Serif KR',serif}
.advisor .nm{font-weight:800;font-size:1.06rem}.advisor .rl{color:var(--sub);font-size:.83rem;margin:.12rem 0 .5rem}
.advisor a{display:inline-flex;align-items:center;gap:.35rem;color:var(--brand);font-weight:800;text-decoration:none;font-variant-numeric:tabular-nums}
.faq{display:grid;gap:.6rem}
.faq details{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;transition:border-color .15s}
.faq details[open]{border-color:color-mix(in srgb,var(--brand) 30%,var(--line))}
.faq summary{list-style:none;cursor:pointer;padding:1.1rem 1.2rem;font-weight:800;font-size:.94rem;display:flex;justify-content:space-between;gap:1rem;align-items:center}
.faq summary::-webkit-details-marker{display:none}.faq .pm{color:var(--brand);font-size:1.35rem;transition:transform .2s ease;line-height:1}
.faq details[open] .pm{transform:rotate(135deg)}.faq .a{padding:0 1.2rem 1.15rem;color:var(--sub);font-size:.9rem;line-height:1.72}

/* 잠금 매물 */
.ledger{background:var(--card);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
.lr{display:flex;align-items:center;justify-content:space-between;gap:1rem;padding:1rem 1.2rem;border-top:1px solid var(--line);transition:background .14s}
.lr:hover{background:color-mix(in srgb,var(--tint) 45%,transparent)}
.lr:first-child{border-top:none}.region{font-weight:800;white-space:nowrap;display:inline-flex;align-items:center;gap:.45rem}
.region::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--brand);box-shadow:0 0 0 3px color-mix(in srgb,var(--brand) 20%,transparent)}

  title:'가게 넘길 때 세금 폭탄 피하기… 권리금·폐업 세무 체크리스트',
  excerpt:'권리금 기타소득, 사업양수도 부가세 특례, 폐업신고와 부가세 확정신고까지 순서대로.',
  lead:'가게를 넘길 때 대금만 신경 쓰다 세금에서 발목이 잡히는 경우가 많다. 권리금과 폐업에는 각각 세무 절차가 따라오고, 순서를 놓치면 가산세를 물거나 양수인과 분쟁이 생긴다. 계약 전에 세금 부담 주체와 신고 순서를 정해두는 것이 안전하다.',
  blocks:[
   ['권리금은 양도인에게 \'기타소득\'이다','받은 <b>권리금은 양도인의 기타소득</b>으로 과세되는 것이 일반적이다. 양수인은 권리금 지급 시 <b>원천징수</b> 의무가 생길 수 있어, 대금 지급 전에 세무 처리를 정해두어야 한다. 계약서에 세금 부담 주체(양도인·양수인)를 명확히 적어야 나중에 서로 떠넘기는 분쟁을 막는다.'],
   ['사업을 통째로 넘기면 \'사업양수도\' 부가세 특례','재고·시설·거래처를 포함해 사업을 <b>포괄적으로 양수도</b>하면 부가가치세가 과세되지 않는 특례가 적용될 수 있다. 다만 \'포괄\' 요건(권리·의무의 포괄 승계)을 못 맞추면 부가세가 붙는다. 요건 충족 여부를 반드시 세무로 확인하고 계약서에 포괄양수도임을 명시한다.'],
   ['폐업신고와 부가세 확정신고를 기한 내에','양도·폐업 시 <b>폐업신고</b>와 함께 <b>부가가치세 확정신고</b>를 기한 내 마쳐야 한다. 놓치면 가산세가 붙는다. 카드단말기 해지, 사업용 계좌·통신판매업 등 부수 등록 정리도 함께 처리한다. 대부분 홈택스에서 순서대로 신고할 수 있다.'],
   ['직원 4대보험·지원금 사후관리까지','직원이 있었다면 <b>4대보험 상실신고</b>와 정산을 마치고, 이전에 받은 정책자금·지원금의 사후관리(의무 고용·유지 조건 등) 위반이 없는지 확인한다. 양수인은 이 정리가 끝났는지 확인한 뒤 인수해야 승계 리스크가 없다.']],
  summary:['권리금은 양도인의 기타소득 — 지급 전 원천징수·부담 주체를 계약서에 정한다.','재고·시설을 포함한 포괄적 사업양수도 요건을 맞추면 부가세 특례가 가능하다.','폐업신고와 부가세 확정신고를 기한 내 마쳐 가산세를 피한다.','직원 4대보험 상실신고·지원금 사후관리까지 정리된 뒤 인수한다.'],
  src:'근거: 소득세법(기타소득), 부가가치세법(사업양수도 특례) 및 국세청 홈택스 폐업·부가세 신고 안내. 개별 세무는 요건·시점에 따라 다르며 세무대리인 확인이 필요하다.'},

 {slug:'muin-maejang',cat:'상권분석',date:'2026.07.19',
  title:'무인매장 창업, 인수 전 반드시 확인할 5가지',
  excerpt:'무인카페·아이스크림·밀키트… 인건비 없는 대신 숨은 비용과 상권 함정을 걸러내는 법.',
  lead:'무인매장은 \'인건비 제로\'라는 말로 창업자를 끌어당긴다. 하지만 무인이라고 손이 안 가는 것은 아니며, 인수 전에 확인하지 않으면 인건비 대신 다른 비용이 새어나간다. 무인 특유의 리스크를 숫자로 검증해야 한다.',
  blocks:[
   ['\'무인\'은 무관리가 아니다 — 운영 실태부터','무인매장도 <b>재고 보충·청소·기기 점검·고객응대(CS)</b>가 필요하다. 인수 전, 현 운영자가 하루 몇 번 방문하는지, 원격관리(결제·CCTV·키오스크) 체계가 어떤지 확인한다. \'완전 방치 가능\'이라는 설명은 대개 과장이다.'],
   ['매출은 \'객단가 × 방문수\' — POS로 검증','무인은 객단가가 낮아 <b>방문수(트래픽)</b>가 생명이다. POS·결제 데이터로 시간대별 매출과 재방문을 검증하고, 소상공인 상권정보시스템·통계청 SGIS로 배후 생활인구를 교차 확인한다. 유동인구가 많아도 체류·구매로 이어지지 않으면 소용없다.'],
   ['도난·기기고장 등 \'무인 특유 비용\'','무인은 <b>도난·먹튀·기기 오류·환불 분쟁</b> 리스크가 있다. CCTV·잠금장치·키오스크 유지보수 계약과 최근 손실 이력을 확인한다. 인건비를 아낀 만큼 이 비용이 얼마나 드는지 계산해야 실수익이 보인다.'],
   ['설비 잔존가치와 리스·렌탈 승계','키오스크·냉동고·자판기 등 <b>설비의 잔존가치와 리스/렌탈 승계 조건</b>을 확인한다. 렌탈 설비를 인수하면 남은 약정이 그대로 넘어온다. 시설권리금은 새것 기준이 아니라 감가된 잔존가치로 판단한다.']],
  summary:['무인도 재고·청소·점검·CS가 필요 — \'완전 방치\'는 과장이다.','객단가가 낮아 방문수가 핵심 — POS·생활인구 데이터로 검증한다.','도난·기기고장·환불 등 무인 특유 비용을 손실 이력으로 확인한다.','설비 잔존가치와 리스/렌탈 승계 조건을 계약 전 점검한다.'],
  src:'근거: 소상공인 상권정보시스템(sg.sbiz.or.kr), 통계청 SGIS(sgis.kostat.go.kr), 지방행정 인허가데이터(localdata.go.kr). 매출·트래픽은 개별 검증이 필요하며 특정 수익을 보장하지 않는다.'},

 {slug:'jeongbogonggae',cat:'운영방식',date:'2026.07.18',
  title:'프랜차이즈 계약 전, 정보공개서에서 반드시 볼 숫자 5개',
  excerpt:'평균매출·폐점 수·필수구매·차액가맹금·인테리어비 — 화려한 홍보보다 정직한 숫자.',
  lead:'프랜차이즈는 검증된 시스템을 사는 대신 종속을 감수하는 선택이다. 그 판단의 근거는 공정거래위원회에 등록된 정보공개서의 숫자에 거의 다 들어 있다. 계약 14일 전 받는 이 문서를 숫자 중심으로 읽어야 한다.',
  blocks:[
   ['① 가맹점 평균매출액과 \'편차\'','정보공개서에는 <b>가맹점 평균매출액</b>과 면적당 매출이 실린다. 평균만 보지 말고 상·하위 편차를 함께 봐야 한다. 평균이 높아도 상위 몇 개 점포가 끌어올린 것이라면 내 점포의 현실과 거리가 멀 수 있다.'],
   ['② 신규개점 대비 계약종료·폐점 수','최근 3년 <b>신규개점 수 대비 계약해지·명의변경·폐점 수</b>는 브랜드의 체력을 보여준다. 개점이 폭발적으로 늘면서 폐점도 함께 급증한다면 \'출점 위주\' 전략일 수 있어 주의가 필요하다.'],
   ['③ 필수구매 품목과 \'차액가맹금\'','본사가 지정한 <b>필수구매 품목</b>과 그로부터 본사가 얻는 <b>차액가맹금(유통 마진)</b>이 공개된다. 로열티가 낮아 보여도 필수구매 마진이 크면 실질 부담은 커진다. 원가율을 좌우하는 핵심 숫자다.'],
   ['④·⑤ 인테리어 비용과 계약 조건','<b>기준점포 인테리어 비용</b>(평당 단가·본사 지정 여부)과 계약기간·갱신·위약 조건을 확인한다. 인테리어를 본사·지정업체로만 해야 하는지, 중도 해지 시 위약금은 어떤지가 초기 비용과 퇴로 비용을 결정한다.']],
  summary:['평균매출은 상·하위 편차와 함께 봐야 내 점포 현실에 가깝다.','최근 3년 신규개점 대비 폐점·해지 수로 브랜드 체력을 가늠한다.','필수구매 품목·차액가맹금이 실질 원가 부담을 좌우한다.','인테리어 비용·계약/갱신/위약 조건으로 초기·퇴로 비용을 확인한다.'],
  src:'근거: 가맹사업거래의 공정화에 관한 법률 및 공정거래위원회 가맹사업거래 정보공개서(franchise.ftc.go.kr). 정보공개서는 계약 14일 전 제공 의무가 있으며, 수치는 브랜드·점포별로 다르다.'},

 {slug:'jeongchaek-jonglyu',cat:'정책자금',date:'2026.07.17',
  title:'같은 정책자금도 창구 따라 다르다… 직접·대리대출 차이와 신청 순서',
  excerpt:'소상공인 정책자금의 직접대출·대리대출 차이, 금리 구조와 한도, 신청 전 준비 순서.',
  lead:'정책자금은 하나가 아니다. 어느 창구로, 어떤 방식으로 신청하느냐에 따라 금리·한도·심사 속도가 달라진다. \'저금리\'라는 홍보만 보고 움직이면 정작 내게 맞는 자금을 놓친다.',
  blocks:[
   ['정책자금은 \'직접대출\'과 \'대리대출\'로 나뉜다','소상공인시장진흥공단(소진공)의 정책자금은 크게 <b>직접대출</b>(소진공이 직접 심사·대출)과 <b>대리대출</b>(소진공이 추천·보증하고 은행이 실행)로 나뉜다. 직접대출은 금리가 낮은 편이지만 예산 소진이 빠르고, 대리대출은 취급 은행이 많아 접근성이 높다. 내 상황에 맞는 트랙을 먼저 정해야 한다.'],
   ['금리는 \'기준금리 + 가산\' 구조 — 고정이 아니다','정책자금 금리는 분기마다 고시되는 <b>정책자금 기준금리</b>에 사업별 가산·차감이 붙어 정해진다. \'저금리\'라는 홍보만 보고 확정 금리로 오해하면 안 된다. 신청 시점의 고시 금리와 본인 적용 조건을 소진공 공지에서 반드시 확인한다.'],
   ['한도와 대상 — 업력·매출 요건을 먼저 본다','자금 종류(일반경영안정·성장기반 등)마다 <b>업력·매출·상시근로자</b> 요건과 한도가 다르다. 창업 초기라면 신청 가능한 자금이 제한되어, 예비창업자 사전보증을 병행해야 하는 경우가 많다. 내 사업체가 어느 자금의 대상인지부터 매칭하는 게 순서다.'],
   ['신청 전 준비 — 교육 이수와 서류','대부분의 정책자금은 <b>소상공인 정책자금 교육 이수</b>와 사업자등록·재무 서류를 요구한다. 신청이 몰리면 접수가 조기 마감되므로, 서류를 미리 갖추고 분기 초 공고를 노리는 편이 유리하다. 자금 계획은 매물 계약보다 먼저 세워야 한다.']],
  summary:['정책자금은 직접대출(저금리·조기소진)과 대리대출(은행 실행·접근성)로 나뉜다.','금리는 분기 고시 기준금리+가산 구조 — 확정 저금리가 아니다.','자금 종류별 업력·매출·한도 요건이 달라 대상 매칭이 먼저다.','교육 이수·서류를 미리 갖추고 분기 초 공고를 노린다.'],
  src:'근거: 소상공인시장진흥공단 정책자금(ols.semas.or.kr) 및 분기별 금리·자금종류 공고. 금리·한도·대상은 시점과 예산에 따라 변동하며 승인을 보장하지 않는다.'},

 {slug:'sajeonbojeung',cat:'정책자금',date:'2026.07.15',
  title:'권리금 5천 치르고 "대출 불가" 통보… \'예비창업자 사전보증\'이 해법',
  excerpt:'권리금·보증금은 정책자금 대출 대상이 아니다. 계약 전에 대출 한도를 확정하는 공식 절차.',
  lead:'창업 자금 계획에서 가장 흔한 실수는 계약을 먼저 하고 대출을 나중에 알아보는 것이다. 권리금과 임차보증금은 정책자금 대출 대상이 아니라는 사실을, 상당수 예비창업자가 계약금과 권리금을 모두 치른 뒤에야 알게 된다.',
  blocks:[
   ['정책자금은 \'시설·운전자금\'이지 권리금이 아니다','소상공인 정책자금은 크게 <b>시설자금</b>과 <b>운전자금</b>으로 나뉜다. 시설자금은 인테리어·설비에, 운전자금은 재료비·인건비 등 운영에 쓰도록 설계돼 있다. 반면 <b>권리금과 임차보증금은 지원 대상에서 제외</b>된다. 창업 초기 목돈이 가장 많이 드는 두 항목을 정책자금으로 해결할 수 없다는 뜻이다. 이 구조를 모르면 \'대출로 권리금까지 메우겠다\'는 계획이 계약 직후 무너진다.'],
   ['신청은 \'사업자등록 후 영업 중\'… 그래서 순서가 꼬인다','대다수 정책자금은 <b>사업자등록을 마치고 실제 영업 중</b>이어야 신청할 수 있다. 계약이 먼저, 대출은 그 뒤라는 뜻이다. 계약금·권리금을 치르고 사업자등록을 한 다음에야 은행 문을 두드리게 되는데, 이 시점에 한도가 기대에 못 미치면 이미 되돌리기 어렵다.'],
   ['해법은 \'예비창업자 사전보증\'… 계약 전에 한도를 확정','신용보증기금과 지역신용보증재단은 사업자등록 전 예비창업 단계에서도 사전심사를 받아 <b>보증예정통지(보증 가능 여부·예상 한도)</b>를 받아둘 수 있는 창구를 운영한다. 계약서에 도장을 찍기 전에 \'내가 받을 수 있는 대출 규모\'를 먼저 가늠할 수 있는 것이다.'],
   ['현실적인 자금 순서','순서를 뒤집어야 한다. <b>희망 조건 정리 → 사전보증 상담(한도 확정) → 매물 계약·사업자등록 → 보증서 기반 대출 실행 → 개업</b>. 이 순서를 지키면 자금이 모자라 계약을 파기하는 최악의 상황을 피할 수 있다. 특히 권리금이 큰 매물일수록 총 가용자금을 먼저 확인한 뒤 매물을 고르는 습관이 필요하다.']],
  summary:['권리금·임차보증금은 정책자금 대출 대상이 아니다(자기자본 준비).','정책자금은 사업자등록 후 영업 중이어야 신청 가능 — 계약이 먼저, 대출이 나중.','예비창업자 사전보증으로 계약 전에 대출 가능액을 확정할 수 있다.','\'조건정리→사전보증→계약→대출→개업\' 순서로 자금 사고를 예방한다.'],
  src:'근거: 소상공인시장진흥공단 정책자금 안내(ols.semas.or.kr), 신용보증기금·지역신용보증재단 창업단계 보증 프로그램. 대출 승인·한도·수익을 보장하지 않으며, 세부 조건은 기관 확인이 필요하다.'},

 {slug:'gwolligeum',cat:'권리금',date:'2026.07.14',
  title:'권리금 부르는 대로 주면 회수에만 몇 년… \'적정선\' 판단하는 4가지 기준',
  excerpt:'바닥·영업·시설 권리금의 차이와 매출 대비 적정 권리금을 판단하는 현실적 기준.',
  lead:'점포 양수도에서 가장 협상이 어려운 항목이 권리금이다. 명확한 공시가격이 없다 보니 \'부르는 게 값\'처럼 느껴지지만, 성격별로 뜯어보면 협상의 근거가 분명히 존재한다. 무엇을 얼마에 사는 것인지부터 구분해야 한다.',
  blocks:[
   ['권리금은 세 가지로 나뉜다','권리금은 통상 <b>바닥·영업·시설권리금</b>으로 구분된다. 바닥권리금은 입지·상권이 주는 자릿세 성격, 영업권리금은 단골·매출·거래처 등 기존 영업이 쌓은 무형의 가치, 시설권리금은 인테리어·주방설비의 잔존가치다. 세 가지를 뭉뚱그리지 말고 각각의 근거를 요구해야 협상 테이블이 만들어진다.'],
   ['영업권리금의 잣대는 \'검증된 월 순이익\'','실무에서는 통상 월 순이익의 <b>6~12개월치</b> 안팎을 기준선으로 보지만, 업종·상권·양도 사유에 따라 편차가 크다. 핵심은 그 순이익이 진짜인지 확인하는 일이다. POS 매출, 부가세 신고 내역, 카드매출 비중을 교차 확인해 매도인이 말하는 수익을 검증해야 한다.'],
   ['시설권리금은 \'감가\'가 핵심이다','새것 기준이 아니라 <b>감가된 잔존가치</b>로 봐야 한다. 설치 시점·상태, 내가 그 업종을 이어받아 재사용할 수 있는지가 관건이다. 업종을 바꾸면 기존 설비 상당수는 가치가 없어질 뿐 아니라, 노후 설비는 오히려 철거·원상복구 비용이 든다.'],
   ['권리금에도 계약서와 세금이 따라온다','반드시 <b>권리(시설·영업)양도양수 계약서</b>로 남긴다. 상가건물 임대차보호법은 임차인의 권리금 회수 기회를 일정 부분 보호한다. 세금도 놓치기 쉽다 — 권리금은 양도인에게 기타소득·사업양수도로 과세될 수 있으니 대금 지급 전에 세무 처리를 확인해야 분쟁을 피한다.']],
  summary:['권리금은 바닥·영업·시설로 나눠 각각의 근거를 요구한다.','영업권리금은 검증된 월 순이익(통상 6~12개월치) 기준 — 매출 검증이 먼저.','시설권리금은 감가·재사용 가능성으로 판단, 노후 설비는 철거비 유의.','권리양수도계약서 작성과 기타소득·양수도 과세 확인은 필수.'],
  src:'근거: 상가건물 임대차보호법(권리금 회수기회 보호 조항), 국세청 기타소득·사업양수도 과세 안내. 적정 권리금은 개별 상권·매출 검증이 필요하며 특정 금액을 보장하지 않는다.'},

 {slug:'unyoung-bangsik',cat:'운영방식',date:'2026.07.13',
  title:'같은 매장도 \'운영 방식\'따라 손에 쥐는 돈이 다르다… 4가지 비교',
  excerpt:'직영·풀오토·위탁·본사(프랜차이즈)의 수익률과 리스크, 내 상황에 맞는 선택 기준.',
  lead:'창업을 준비할 때 업종·입지만큼 중요한 것이 \'어떻게 운영할 것인가\'다. 같은 매출을 내는 매장이라도 운영 방식에 따라 사장이 실제로 손에 쥐는 돈과 감당할 리스크가 크게 갈린다.',
  blocks:[
   ['직영 — 수익률 최고, 시간 투입도 최고','사장이 직접 운영한다. 인건비가 빠지지 않아 <b>수익률이 가장 높다</b>. 대신 사장의 시간과 노동이 통째로 들어간다. 초기 자본이 넉넉지 않고 몸으로 뛸 준비가 된 창업자에게 적합하다.'],
   ['풀오토 — 시간은 자유, 관건은 인력관리','점장·직원에게 맡기고 사장은 관리·정산만 한다. 인건비만큼 수익률은 내려가지만 <b>시간이 자유롭다</b>. 핵심 리스크는 인력 관리와 매출 누수 — 믿을 점장, 현금·재고 관리 체계가 없으면 \'오토\'가 아니라 \'방치\'가 된다.'],
   ['위탁 — 진입장벽은 낮지만 계약조건이 관건','운영을 전문 업체·점장에 맡기고 수수료를 낸다. 초보도 진입할 수 있지만 <b>수수료 구조·정산 투명성·해지 조항</b>을 반드시 따져야 한다. 손실 시 책임 소재, 중도 해지 위약 조건을 계약서로 확인하지 않으면 분쟁 소지가 크다.'],
   ['본사(프랜차이즈) — 시스템을 사는 대신 종속을 감수','검증된 매뉴얼·물류·브랜드를 얻는 대신 <b>로열티·필수구매·계약 종속</b>이 따른다. 계약 전 반드시 공정위 등록 <b>정보공개서</b>(가맹점 평균매출·인근 점포 수·폐점률·필수구매 마진)를 확인한다. 화려한 홍보보다 정보공개서의 숫자가 정직하다.']],
  summary:['직영은 수익률 최고·시간 투입 최고 — 몸으로 뛸 준비된 창업자에게.','풀오토는 시간 자유 대신 인력관리·매출누수 리스크 관리가 핵심.','위탁은 진입장벽이 낮지만 수수료·정산·해지 계약조건을 반드시 확인.','프랜차이즈는 정보공개서(평균매출·폐점률·필수구매)로 수익성을 검증.'],
  src:'근거: 가맹사업거래의 공정화에 관한 법률(정보공개서 제공 의무), 각 운영형태 표준계약 관행. 수익률·안정성은 입지·업종·운영 역량에 따라 달라지며 보장되지 않는다.'},

 {slug:'sanggwon-data',cat:'상권분석',date:'2026.07.12',
  title:'감으로 자리 고르지 마라… 무료 공공데이터로 상권 검증하는 4단계',
  excerpt:'상권정보시스템·인허가데이터·SGIS로 유동인구와 폐업률을 직접 확인하는 순서.',
  lead:'창업 실패의 상당수는 \'자리\'에서 갈린다. 그런데 좋은 자리는 감이나 발품에만 기댈 문제가 아니다. 정부·지자체가 무료로 공개하는 상권 데이터만 제대로 써도 후보지의 위험 신호를 미리 걸러낼 수 있다.',
  blocks:[
   ['1단계 — 상권정보시스템으로 매출·유동인구 추정','소상공인시장진흥공단 <b>상권정보시스템(sg.sbiz.or.kr)</b>에서 업종별 점포 수·추정 매출·유동인구·증감을 무료로 본다. 서울이라면 <b>우리마을가게 상권분석(golmok.seoul.go.kr)</b>이 더 촘촘하다. 목적은 여러 후보지를 같은 잣대로 비교해 \'가망 없는 자리\'를 빠르게 거르는 것.'],
   ['2단계 — 인허가데이터로 개·폐업 이력 확인','행정안전부 <b>지방행정 인허가데이터(localdata.go.kr)</b>에서 그 자리·업종의 개업·폐업 이력을 본다. 같은 자리에서 폐업이 반복됐다면 임대료·동선·상권에 이유가 있다. 숫자로 남은 이력은 중개인의 설명보다 정직하다.'],
   ['3단계 — 배후세대·생활인구의 \'성격\'을 본다','통계청 <b>SGIS(sgis.kostat.go.kr)</b>로 주거·오피스 배후와 시간대별 생활인구를 확인한다. 점심 장사가 핵심인데 저녁·주말형 상권이면 유동인구가 많아도 매출로 이어지지 않는다. \'누가, 언제, 왜\' 지나가는지가 절대량보다 중요하다.'],
   ['4단계 — 데이터 다음은 반드시 임장','후보를 2~3곳으로 좁혔다면 요일·시간대를 바꿔 직접 방문해 실제 유동·경쟁·주차·공실을 눈으로 확인한다. 추정 데이터와 현장은 다를 수 있다. \'데이터로 좁히고 발로 검증\'하는 순서면 실패 확률이 크게 준다.']],
  summary:['상권정보시스템·서울 우리마을가게로 매출·유동인구를 먼저 비교한다.','인허가데이터(localdata)로 개·폐업 이력을 확인해 위험 자리를 거른다.','SGIS로 배후세대·시간대별 생활인구의 성격이 업종과 맞는지 본다.','데이터로 후보를 좁힌 뒤 요일·시간대를 바꿔 임장으로 최종 검증한다.'],
  src:'근거: 소상공인시장진흥공단 상권정보시스템, 서울시 우리마을가게 상권분석서비스, 행정안전부 지방행정인허가데이터, 통계청 SGIS. 추정·이력 데이터이므로 최종 판단 전 현장 확인이 필요하다.'},

 {slug:'imdaechataccount',cat:'권리금',date:'2026.07.16',
  title:'계약서 도장 찍기 전, 상가 임대차에서 반드시 확인할 5가지',
  excerpt:'환산보증금·계약갱신요구권·제소전화해·원상복구·권리금 회수까지 — 초보가 놓치는 독소조항.',
  lead:'점포를 넘겨받을 때 매도인과의 권리 양수도만 챙기다 정작 건물주와의 임대차 계약을 소홀히 하는 경우가 많다. 임대차 계약서 한 줄이 몇 년 뒤 수천만 원의 차이를 만든다.',
  blocks:[
   ['환산보증금과 보호 범위','상가건물 임대차보호법의 여러 보호는 <b>환산보증금(보증금 + 월세×100)</b>이 지역별 기준 이하일 때 더 두텁게 적용된다. 내 계약이 그 안에 드는지부터 확인해야 5%로 제한되는 임대료 인상 상한 같은 보호를 받을 수 있다.'],
   ['계약갱신요구권 — 최대 10년','임차인은 특별한 사유가 없는 한 <b>최초 계약을 포함해 최대 10년까지 갱신을 요구</b>할 수 있다. 잔여 계약기간과 이미 경과한 기간을 확인해, 내가 안정적으로 영업할 수 있는 기간이 얼마나 남았는지 반드시 계산한다.'],
   ['제소전화해·원상복구 조항 점검','임대인이 요구하는 <b>제소전화해</b>는 분쟁 시 곧바로 명도집행이 가능해 임차인에게 불리할 수 있다. <b>원상복구 범위</b>도 \'인수 당시 상태\'인지 \'최초 골조\'인지에 따라 퇴거 비용이 크게 갈리므로 문구를 명확히 한다.'],

function initHome(){
  var g=function(id){return document.getElementById(id);};

  var go=g('gwGo');
  if(go) go.addEventListener('click',function(){
    var out=g('gwOut'),note=g('gwNote'),rng=g('gwRange');
    var profit=Number((g('gwProfit').value||'').replace(/[^0-9]/g,''));

    note.textContent='월 순이익의 '+Math.round(lo*loc)+'~'+Math.round(hi*loc)+'개월치 기준 · 참고용';

    out.hidden=false;out.scrollIntoView({behavior:'smooth',block:'nearest'});
  });
}
function initSurvey(){

    g('lbInd').innerHTML=(s?'기타 업종':'기타 희망 업종')+' <span class="hint">(목록에 없으면 직접 입력)</span>';
    g('lbReg').innerHTML=(s?'매장 지역':'희망 지역')+' <span class="hint">'+(s?'(예: 마포구 망원동)':'(예: 마포구, 강남구)')+'</span>';
    g('lbDeposit').innerHTML=(s?'보증금':'보증금 최대')+' <span class="hint">(만원)</span>';
    g('lbRent').innerHTML=(s?'월세':'월세 최대')+' <span class="hint">(만원)</span>';
    g('lbPremium').innerHTML=(s?'희망 권리금':'권리금 최대')+' <span class="hint">(만원)</span>';
    g('lbNotes').innerHTML=(s?'매장 소개 / 양도 사유':'추가 요청사항')+' <span class="hint">(선택)</span>';
    g('sellerBox').hidden=!s;
    g('submit').textContent=s?'무료로 매물 등록·상담받기':'무료로 매물 추천받기';
  }
  g('role').addEventListener('click',function(e){var b=e.target.closest('.chip');if(!b)return;role=b.dataset.role;Array.prototype.forEach.call(g('role').children,function(c){c.classList.toggle('on',c===b);});applyRole();});
  var catsEl=g('cats'),subWrap=g('subwrap');
  Object.keys(CATS).forEach(function(c){var b=document.createElement('button');b.type='button';b.className='chip';b.textContent=c;b.dataset.cat=c;catsEl.appendChild(b);});
  catsEl.addEventListener('click',function(e){var b=e.target.closest('.chip');if(!b)return;var c=b.dataset.cat,i=selCats.indexOf(c);if(i>=0){selCats.splice(i,1);delete selSubs[c];b.classList.remove('on');}else{selCats.push(c);selSubs[c]=selSubs[c]||[];b.classList.add('on');}renderSubs();});
  function renderSubs(){subWrap.innerHTML='';selCats.forEach(function(c){var w=document.createElement('div');w.className='subgroup';var l=document.createElement('div');l.className='sgl';l.textContent=c+' 세부 업종';w.appendChild(l);var ch=document.createElement('div');ch.className='chips';CATS[c].forEach(function(s){var sb=document.createElement('button');sb.type='button';sb.className='chip'+(selSubs[c].indexOf(s)>=0?' on':'');sb.textContent=s;sb.addEventListener('click',function(){var j=selSubs[c].indexOf(s);if(j>=0){selSubs[c].splice(j,1);sb.classList.remove('on');}else{selSubs[c].push(s);sb.classList.add('on');}});ch.appendChild(sb);});w.appendChild(ch);subWrap.appendChild(w);});}
  function collectIndustries(){var out=[];selCats.forEach(function(c){var subs=selSubs[c]||[];if(subs.length===0){out.push(c);}else{subs.forEach(function(s){out.push(s);});}});tags(g('industries').value).forEach(function(t){out.push(t);});return out.filter(function(s){return s.length<=30;}).slice(0,10);}
  // ===== 오프미팅 달력(선택 · 평일 11~16시 · 실시간 예약 마감 반영) =====
  var meeting={date:null,time:null};
  var DOW=['일','월','화','수','목','금','토'];
  var SLOTS=['11:00','12:00','13:00','14:00','15:00','16:00'];
  var takenSet=new Set();
  var SLOTS_URL='https://buzcnfnimzlsjvbeefjb.supabase.co/functions/v1/slots';
  var calBox=g('cal');
  var today=new Date();today.setHours(0,0,0,0);
  var view=new Date(today.getFullYear(),today.getMonth(),1);
  var maxV=new Date(today.getFullYear(),today.getMonth()+2,1);
  function sameDay(a,b){return a&&b&&a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}
  function fmtSlot(t){var h=parseInt(t,10);return (h<12?'오전 ':'오후 ')+(h>12?h-12:h)+':00';}
  function fmtDate(d){return (d.getMonth()+1)+'월 '+d.getDate()+'일('+DOW[d.getDay()]+')';}
  function keyOf(d,t){var mm=('0'+(d.getMonth()+1)).slice(-2),dd=('0'+d.getDate()).slice(-2);return d.getFullYear()+'-'+mm+'-'+dd+' '+t;}
  function dayFull(d){return SLOTS.every(function(t){return takenSet.has(keyOf(d,t));});}
  function meetingStr(){if(!meeting.date||!meeting.time)return null;var d=meeting.date,mm=('0'+(d.getMonth()+1)).slice(-2),dd=('0'+d.getDate()).slice(-2);return d.getFullYear()+'-'+mm+'-'+dd+'('+DOW[d.getDay()]+') '+meeting.time;}
  function renderCal(){
    var y=view.getFullYear(),m=view.getMonth();
    var start=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate();
    var pd=(y===today.getFullYear()&&m===today.getMonth());
    var nd=(y===maxV.getFullYear()&&m===maxV.getMonth());
    var h='<div class="calnav"><button type="button" data-nav="-1"'+(pd?' disabled':'')+'>‹</button><b>'+y+'년 '+(m+1)+'월</b><button type="button" data-nav="1"'+(nd?' disabled':'')+'>›</button></div>';
    h+='<div class="caldow">'+DOW.map(function(d,i){return '<span'+(i===0?' style="color:#d1584f"':'')+'>'+d+'</span>';}).join('')+'</div><div class="calgrid">';
    for(var i=0;i<start;i++)h+='<span></span>';
    for(var d=1;d<=days;d++){var cd=new Date(y,m,d),w=cd.getDay(),base=(w===0||w===6||cd<today),full=(!base&&dayFull(cd)),off=base||full,sel=sameDay(cd,meeting.date);h+='<span class="cell'+(off?' off':'')+(w===0?' sun':'')+(sel?' sel':'')+'"'+(off?'':' data-d="'+d+'"')+(full?' title="예약 마감"':'')+'>'+d+'</span>';}
    h+='</div>';
    if(meeting.date){h+='<div class="slots">'+SLOTS.map(function(t){var taken=takenSet.has(keyOf(meeting.date,t));return '<button type="button" class="chip'+(meeting.time===t?' on':'')+(taken?' slotoff':'')+'"'+(taken?' disabled':' data-t="'+t+'"')+'>'+fmtSlot(t)+(taken?' 마감':'')+'</button>';}).join('')+'</div>';}
    if(meeting.date&&meeting.time){h+='<div class="msum"><span>선택: '+fmtDate(meeting.date)+' '+fmtSlot(meeting.time)+'</span><button type="button" class="clr" data-clr="1">지우기</button></div>';}
    calBox.innerHTML=h;
  }
  calBox.addEventListener('click',function(e){
    var nav=e.target.closest('[data-nav]');if(nav){view=new Date(view.getFullYear(),view.getMonth()+parseInt(nav.dataset.nav,10),1);renderCal();return;}
    var cell=e.target.closest('[data-d]');if(cell){meeting.date=new Date(view.getFullYear(),view.getMonth(),parseInt(cell.dataset.d,10));meeting.time=null;renderCal();return;}

  fetch(SLOTS_URL,{cache:'no-store'}).then(function(r){return r.json();}).then(function(d){takenSet=new Set(d.taken||[]);if(meeting.date&&meeting.time&&takenSet.has(keyOf(meeting.date,meeting.time)))meeting.time=null;renderCal();}).catch(function(){});

    fetch(LEADS_URL,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({role:role,name:g('name').value,phone:g('phone').value,contactChannel:g('channel').value,operationTypes:ops,industries:collectIndustries(),regions:tags(g('regions').value).filter(function(s){return s.length<=30;}).slice(0,10),depositMax:man(g('deposit').value),rentMax:man(g('rent').value),premiumMax:man(g('premium').value),monthlyRevenue:man(g('revenue').value),notes:(g('notes').value+(SRC&&SRC!=='direct'?'\n[유입: '+SRC+']':'')).trim(),meetingPreference:meetingStr(),website:g('website').value})})
    .then(function(res){if(!res.ok)throw new Error('제출 실패 — 잠시 후 다시 시도해주세요');g('form-view').hidden=true;g('done-view').hidden=false;window.scrollTo(0,0);})
    .catch(function(ex){err.textContent=ex.message||'제출 실패';err.hidden=false;})
    .finally(function(){g('submit').disabled=false;g('submit').textContent=(role==='SELLER'?'무료로 매물 등록·상담받기':'무료로 매물 추천받기');});});
}

//==================== 라우터 ====================
function route(){
  var h=(location.hash||'#home').replace(/^#/,'');
  var sticky=document.getElementById('sticky');
  var view, active='home';
  if(h.indexOf('post/')===0){ view=viewPost(h.slice(5)); active='info'; }
  else if(h==='info'){ view=viewInfo(); active='info'; }
  else if(h==='survey'){ view=viewSurvey(); active='survey'; }
  else if(h==='terms'){ view=viewTerms(); active=''; }
  else if(h==='privacy'){ view=viewPrivacy(); active=''; }
  else if(h==='ads'){ view=viewAds(); active=''; }
  else { view=viewHome(); active='home'; }
  app.innerHTML=view;
  document.querySelectorAll('.nav a[data-go]').forEach(function(a){a.classList.toggle('on',a.getAttribute('data-go')===active && !a.classList.contains('cta'));});
  sticky.hidden=(h==='survey');
  window.scrollTo(0,0);
  if(h==='info'){ var fl=document.getElementById('filters'); if(fl)fl.addEventListener('click',function(e){var b=e.target.closest('.fchip');if(!b)return;curCat=b.dataset.cat;route();}); }
  if(h==='survey'){ initSurvey(); }
  if(active==='home'){ initHome(); }
}
document.addEventListener('click',function(e){var el=e.target.closest('[data-go]');if(!el)return;e.preventDefault();var to=el.getAttribute('data-go');location.hash='#'+to;});
window.addEventListener('hashchange',route);
route();
</script>
