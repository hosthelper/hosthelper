name: Deploy Survey Pages

# 창업정보 모임 공개 설문 페이지를 GitHub Pages로 배포.
# 배경: Supabase Functions·jsDelivr·githack 모두 HTML을 text/plain으로 강제하거나
# 국내 접속 신뢰 문제가 있어 github.io 정적 호스팅 사용 (ADR-0003 참조).
on:
  push:
    branches: ["claude/store-listing-marketplace-2csxjf", "main"]
    paths:
      - "apps/changup/public-survey/**"
      - ".github/workflows/deploy-survey.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/changup/public-survey
      - id: deployment
        uses: actions/deploy-pages@v4
