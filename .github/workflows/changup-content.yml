name: 창업정보 모임 자동 콘텐츠

# 매일 오전 9시(KST)에 AI로 창업 정보 기사를 1편 생성해, 라이브 SPA(app.html)의
# ARTICLES 배열에 직접 삽입하고 index.html로 동기화한 뒤 main에 바로 커밋합니다.
# (Netlify가 main을 자동 배포 → 사이트에 즉시 반영)
#
# 필요 설정(사용자, 최초 1회):
#   저장소 Settings → Secrets and variables → Actions → New secret:
#     GEMINI_API_KEY = <Google Gemini 무료 API 키>  (무료 발급: https://aistudio.google.com/apikey)
#   * 키가 없으면 그날 회차는 조용히 건너뜁니다(빨간불 없음). 신용카드 불필요.

on:
  schedule:
    - cron: '0 0 * * *'   # 매일 00:00 UTC = 09:00 KST
  workflow_dispatch:        # 수동 실행 버튼

permissions:
  contents: write

concurrency:
  group: changup-content
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    if: ${{ github.repository == 'hosthelper/hosthelper' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install generator deps
        working-directory: apps/changup-site/scripts
        run: npm install --no-save zod

      - name: Generate article (app.html ARTICLES 삽입)
        id: gen
        working-directory: apps/changup-site/scripts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CHANGUP_AI_MODEL: ${{ vars.CHANGUP_AI_MODEL || 'gemini-2.5-flash' }}
        run: node generate-post.mjs

      - name: Commit to main (자동 발행)
        run: |
          set -e
          git config user.name "changup-content-bot"
          git config user.email "bot@users.noreply.github.com"
          git add apps/changup-site/app.html apps/changup-site/index.html
          if git diff --cached --quiet; then
            echo "변경 없음(키·크레딧 미설정 또는 이미 오늘 발행) — 스킵"; exit 0
          fi
          TITLE="${{ steps.gen.outputs.title }}"
          CAT="${{ steps.gen.outputs.cat }}"
          git commit -m "content(changup-site): 자동 발행 — ${TITLE:-창업 정보} (${CAT:-정보}) [skip ci]"
          git push origin HEAD:main
