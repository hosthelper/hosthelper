name: 창업정보 모임 자동 콘텐츠

# 매일 오전 9시(KST)에 AI로 창업 정보 기사를 1편 생성해, 라이브 SPA(app.html)의
# ARTICLES 배열에 직접 삽입하고 index.html로 동기화한 뒤 main에 바로 커밋합니다.
# (Netlify가 main을 자동 배포 → 사이트에 즉시 반영)
#
# AI는 GitHub Models 무료 추론을 사용합니다 — 별도 API 키·시크릿·가입이 필요 없습니다.
# (워크플로의 내장 GITHUB_TOKEN + permissions: models: read 로 동작)

on:
  schedule:
    - cron: '0 0 * * *'   # 매일 00:00 UTC = 09:00 KST
  workflow_dispatch:        # 수동 실행 버튼

permissions:
  contents: write
  models: read

concurrency:
  group: changup-content
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    if: ${{ github.repository == 'hosthelper/hosthelper' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install generator deps
        working-directory: apps/changup-site/scripts
        run: npm install --no-save zod

      - name: Generate article (app.html ARTICLES 삽입)
        id: gen
        working-directory: apps/changup-site/scripts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANGUP_AI_MODEL: ${{ vars.CHANGUP_AI_MODEL || 'openai/gpt-4o-mini' }}
        run: node generate-post.mjs

      - name: Commit to main (자동 발행)
        run: |
          set -e
          git config user.name "changup-content-bot"
          git config user.email "bot@users.noreply.github.com"
          git add apps/changup-site/app.html apps/changup-site/index.html
          if git diff --cached --quiet; then
            echo "변경 없음(이미 오늘 발행됨 또는 일시 스킵) — 종료"; exit 0
          fi
          TITLE="${{ steps.gen.outputs.title }}"
          CAT="${{ steps.gen.outputs.cat }}"
          git commit -m "content(changup-site): 자동 발행 — ${TITLE:-창업 정보} (${CAT:-정보}) [skip ci]"
          git push origin HEAD:main
