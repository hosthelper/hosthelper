name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: hosthelper
          POSTGRES_PASSWORD: hosthelper
          POSTGRES_DB: hosthelper
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hosthelper"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql://hosthelper:hosthelper@localhost:5432/hosthelper?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-secret

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm db:generate

      - name: Build shared packages
        run: |
          pnpm --filter @hosthelper/shared build
          pnpm --filter @hosthelper/db build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Apply migrations
        run: pnpm --filter @hosthelper/db exec prisma migrate deploy

      # 스모크 테스트가 PricingRule 등 기준 데이터를 요구하므로 시드 필수
      - name: Seed
        run: pnpm --filter @hosthelper/db seed

      - name: Build apps
        run: pnpm build

      - name: API smoke test
        env:
          NODE_ENV: development
          API_PORT: 4000
        run: |
          node apps/api/dist/main.js &
          API_PID=$!
          # 부팅 대기
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:4000/health > /dev/null 2>&1; then
              echo "API is up"
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:4000/health
          curl -fsS -X POST http://127.0.0.1:4000/api/pricing/quote \
            -H 'content-type: application/json' \
            -d '{"pyeong":20,"bedrooms":2,"cleaningStartAt":"2026-06-01T11:00:00.000Z","cleaningEndAt":"2026-06-01T14:00:00.000Z"}'
          kill $API_PID
